stages:
  make-diffs:
    cmd: bash --noprofile --norc scripts/make-diffs.sh
    deps:
      - scripts/make-diffs.sh
      - ClimaCoupler.jl
      - ClimaCoupler.jl-mod
      - ClimaCore.jl
      - ClimaCore.jl-mod
      - ClimaAtmos.jl
      - ClimaAtmos.jl-mod
      - CloudMicrophysics.jl-mod
    outs:
      - diffs:
          cache: false
          persist: false
    desc: Automatically generated from the 'make-diffs' stage in 
      calkit.yaml. Changes made here will be overwritten.
  baseline-nsys:
    cmd: calkit scheduler batch --name baseline-nsys --environment 
      clima --dep scripts/run.jl --dep ClimaCoupler.jl/src --dep 
      ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      --dep ClimaCoupler.jl/experiments/AMIP/Manifest-v1.11.toml --dep
      ClimaCoupler.jl/experiments/AMIP/code_loading.jl --dep 
      ClimaCore.jl/ext --dep ClimaCore.jl/src --dep ClimaCore.jl/lib 
      --dep ClimaAtmos.jl/src --dep .calkit/env-locks/clima --out 
      results/nsys/baseline.nsys-rep --out 
      results/nsys/baseline.sqlite -- scripts/run-nsys.sh 
      results/nsys/baseline ClimaCoupler.jl/experiments/AMIP 
      ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
    deps:
      - scripts/run-nsys.sh
      - scripts/run.jl
      - ClimaCoupler.jl/src
      - ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      - ClimaCoupler.jl/experiments/AMIP/Manifest-v1.11.toml
      - ClimaCoupler.jl/experiments/AMIP/code_loading.jl
      - ClimaCore.jl/ext
      - ClimaCore.jl/src
      - ClimaCore.jl/lib
      - ClimaAtmos.jl/src
      - .calkit/env-locks/clima
    outs:
      - results/nsys/baseline.nsys-rep:
          persist: true
      - results/nsys/baseline.sqlite:
          persist: true
      - .calkit/scheduler/logs/baseline-nsys.out:
          cache: false
          persist: true
    desc: Automatically generated from the 'baseline-nsys' stage in 
      calkit.yaml. Changes made here will be overwritten.
  mod-nsys:
    cmd: calkit scheduler batch --name mod-nsys --environment clima 
      --dep scripts/run.jl --dep ClimaCoupler.jl-mod/src --dep 
      ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      --dep ClimaCoupler.jl-mod/experiments/AMIP/Manifest-v1.11.toml 
      --dep ClimaCoupler.jl-mod/experiments/AMIP/code_loading.jl --dep
      ClimaCore.jl-mod/ext --dep ClimaCore.jl-mod/src --dep 
      ClimaCore.jl-mod/lib --dep ClimaAtmos.jl-mod/src --dep 
      ClimaAtmos.jl-mod/config --dep CloudMicrophysics.jl-mod/src 
      --dep .calkit/env-locks/clima --out results/nsys/mod.nsys-rep 
      --out results/nsys/mod.sqlite -- scripts/run-nsys.sh 
      results/nsys/mod ClimaCoupler.jl-mod/experiments/AMIP 
      ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
    deps:
      - scripts/run-nsys.sh
      - scripts/run.jl
      - ClimaCoupler.jl-mod/src
      - ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      - ClimaCoupler.jl-mod/experiments/AMIP/Manifest-v1.11.toml
      - ClimaCoupler.jl-mod/experiments/AMIP/code_loading.jl
      - ClimaCore.jl-mod/ext
      - ClimaCore.jl-mod/src
      - ClimaCore.jl-mod/lib
      - ClimaAtmos.jl-mod/src
      - ClimaAtmos.jl-mod/config
      - CloudMicrophysics.jl-mod/src
      - .calkit/env-locks/clima
    outs:
      - results/nsys/mod.nsys-rep:
          persist: true
      - results/nsys/mod.sqlite:
          persist: true
      - .calkit/scheduler/logs/mod-nsys.out:
          cache: false
          persist: true
    desc: Automatically generated from the 'mod-nsys' stage in 
      calkit.yaml. Changes made here will be overwritten.
  baseline-ncu:
    cmd: calkit scheduler batch --name baseline-ncu --environment 
      clima --dep scripts/run.jl --dep ClimaCoupler.jl/src --dep 
      ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      --dep ClimaCoupler.jl/experiments/AMIP/Manifest-v1.11.toml --dep
      ClimaCoupler.jl/experiments/AMIP/code_loading.jl --dep 
      ClimaCore.jl/ext --dep ClimaCore.jl/src --dep ClimaCore.jl/lib 
      --dep ClimaAtmos.jl/src --dep .calkit/env-locks/clima --out 
      results/ncu/baseline.ncu-rep --out 
      results/ncu/baseline-details.csv -- scripts/run-ncu.sh 
      results/ncu/baseline --kernel-name 
      regex:set_microphysics_tendency_cache__FILE_ClimaAtmos_jl_src_cache_microphysics_cache_jl_L[0-9]+
      --project ClimaCoupler.jl/experiments/AMIP --config 
      ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      --launch-skip 3 --launch-count 6
    deps:
      - scripts/run-ncu.sh
      - scripts/run.jl
      - ClimaCoupler.jl/src
      - ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      - ClimaCoupler.jl/experiments/AMIP/Manifest-v1.11.toml
      - ClimaCoupler.jl/experiments/AMIP/code_loading.jl
      - ClimaCore.jl/ext
      - ClimaCore.jl/src
      - ClimaCore.jl/lib
      - ClimaAtmos.jl/src
      - .calkit/env-locks/clima
    outs:
      - results/ncu/baseline.ncu-rep:
          persist: true
      - results/ncu/baseline-details.csv:
          cache: false
          persist: true
      - .calkit/scheduler/logs/baseline-ncu.out:
          cache: false
          persist: true
    frozen: true
    desc: Automatically generated from the 'baseline-ncu' stage in 
      calkit.yaml. Changes made here will be overwritten.
  mod-ncu:
    cmd: calkit scheduler batch --name mod-ncu --environment clima 
      --dep scripts/run.jl --dep ClimaCoupler.jl-mod/src --dep 
      ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      --dep ClimaCoupler.jl-mod/experiments/AMIP/Manifest-v1.11.toml 
      --dep ClimaCoupler.jl-mod/experiments/AMIP/code_loading.jl --dep
      ClimaCore.jl-mod/ext --dep ClimaCore.jl-mod/src --dep 
      ClimaCore.jl-mod/lib --dep ClimaAtmos.jl-mod/src --dep 
      CloudMicrophysics.jl-mod/src --dep .calkit/env-locks/clima --out
      results/ncu/mod.ncu-rep --out results/ncu/mod-details.csv -- 
      scripts/run-ncu.sh results/ncu/mod --kernel-name 
      regex:set_microphysics_tendency_cache__FILE_ClimaAtmos_jl_mod_src_cache_microphysics_cache_jl_L[0-9]+
      --project ClimaCoupler.jl-mod/experiments/AMIP --config 
      ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      --launch-skip 3 --launch-count 6
    deps:
      - scripts/run-ncu.sh
      - scripts/run.jl
      - ClimaCoupler.jl-mod/src
      - ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      - ClimaCoupler.jl-mod/experiments/AMIP/Manifest-v1.11.toml
      - ClimaCoupler.jl-mod/experiments/AMIP/code_loading.jl
      - ClimaCore.jl-mod/ext
      - ClimaCore.jl-mod/src
      - ClimaCore.jl-mod/lib
      - ClimaAtmos.jl-mod/src
      - CloudMicrophysics.jl-mod/src
      - .calkit/env-locks/clima
    outs:
      - results/ncu/mod.ncu-rep:
          persist: true
      - results/ncu/mod-details.csv:
          cache: false
          persist: true
      - .calkit/scheduler/logs/mod-ncu.out:
          cache: false
          persist: true
    desc: Automatically generated from the 'mod-ncu' stage in 
      calkit.yaml. Changes made here will be overwritten.
  amip-baseline:
    cmd: calkit scheduler batch --name amip-baseline --environment 
      clima --dep ClimaCoupler.jl/experiments/AMIP/run_simulation.jl 
      --dep ClimaCoupler.jl/src --dep 
      ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      --dep ClimaCoupler.jl/experiments/AMIP/Manifest-v1.11.toml --dep
      ClimaCoupler.jl/experiments/AMIP/code_loading.jl --dep 
      ClimaCore.jl/ext --dep ClimaCore.jl/src --dep ClimaCore.jl/lib 
      --dep ClimaAtmos.jl/src --dep ClimaAtmos.jl/toml --dep 
      .calkit/env-locks/clima -- scripts/run-julia-script.sh 
      --project=ClimaCoupler.jl/experiments/AMIP 
      ClimaCoupler.jl/experiments/AMIP/run_simulation.jl --config_file
      ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      --job_id gpu_amip_progedmf_1M_land_he16_baseline
    deps:
      - scripts/run-julia-script.sh
      - ClimaCoupler.jl/experiments/AMIP/run_simulation.jl
      - ClimaCoupler.jl/src
      - ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      - ClimaCoupler.jl/experiments/AMIP/Manifest-v1.11.toml
      - ClimaCoupler.jl/experiments/AMIP/code_loading.jl
      - ClimaCore.jl/ext
      - ClimaCore.jl/src
      - ClimaCore.jl/lib
      - ClimaAtmos.jl/src
      - ClimaAtmos.jl/toml
      - .calkit/env-locks/clima
    outs:
      - .calkit/scheduler/logs/amip-baseline.out:
          cache: false
          persist: true
    desc: Automatically generated from the 'amip-baseline' stage in 
      calkit.yaml. Changes made here will be overwritten.
  amip-mod:
    cmd: calkit scheduler batch --name amip-mod --environment clima 
      --dep ClimaCoupler.jl-mod/experiments/AMIP/run_simulation.jl 
      --dep ClimaCoupler.jl-mod/src --dep 
      ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      --dep ClimaCoupler.jl-mod/experiments/AMIP/Manifest-v1.11.toml 
      --dep ClimaCoupler.jl-mod/experiments/AMIP/code_loading.jl --dep
      ClimaCore.jl-mod/ext --dep ClimaCore.jl-mod/src --dep 
      ClimaCore.jl-mod/lib --dep ClimaAtmos.jl-mod/src --dep 
      ClimaAtmos.jl-mod/toml --dep ClimaAtmos.jl-mod/config --dep 
      CloudMicrophysics.jl-mod/src --dep .calkit/env-locks/clima -- 
      scripts/run-julia-script.sh 
      --project=ClimaCoupler.jl-mod/experiments/AMIP 
      ClimaCoupler.jl-mod/experiments/AMIP/run_simulation.jl 
      --config_file 
      ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      --job_id gpu_amip_progedmf_1M_land_he16_mod
    deps:
      - scripts/run-julia-script.sh
      - ClimaCoupler.jl-mod/experiments/AMIP/run_simulation.jl
      - ClimaCoupler.jl-mod/src
      - ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      - ClimaCoupler.jl-mod/experiments/AMIP/Manifest-v1.11.toml
      - ClimaCoupler.jl-mod/experiments/AMIP/code_loading.jl
      - ClimaCore.jl-mod/ext
      - ClimaCore.jl-mod/src
      - ClimaCore.jl-mod/lib
      - ClimaAtmos.jl-mod/src
      - ClimaAtmos.jl-mod/toml
      - ClimaAtmos.jl-mod/config
      - CloudMicrophysics.jl-mod/src
      - .calkit/env-locks/clima
    outs:
      - .calkit/scheduler/logs/amip-mod.out:
          cache: false
          persist: true
    desc: Automatically generated from the 'amip-mod' stage in 
      calkit.yaml. Changes made here will be overwritten.
  summarize:
    cmd: calkit xenv -n py --no-check -- python scripts/summarize.py
    deps:
      - scripts/summarize.py
      - results/nsys/baseline.sqlite
      - results/nsys/mod.sqlite
      - .calkit/env-locks/py
      - .calkit/scheduler/logs/amip-baseline.out
      - .calkit/scheduler/logs/amip-mod.out
    outs:
      - results/summary.json:
          cache: false
          persist: false
    desc: Automatically generated from the 'summarize' stage in 
      calkit.yaml. Changes made here will be overwritten.
  compare-kernels:
    cmd: calkit nb execute --environment py --no-check --to html 
      "notebooks/compare-kernels.ipynb"
    deps:
      - .calkit/notebooks/cleaned/notebooks/compare-kernels.ipynb
      - .calkit/env-locks/py
      - results/nsys/baseline.nsys-rep
      - results/nsys/baseline.sqlite
      - .calkit/scheduler/logs/baseline-nsys.out
      - results/nsys/mod.nsys-rep
      - results/nsys/mod.sqlite
      - .calkit/scheduler/logs/mod-nsys.out
    outs:
      - .calkit/notebooks/executed/notebooks/compare-kernels.ipynb:
          cache: false
      - .calkit/notebooks/html/notebooks/compare-kernels.html:
          cache: false
    desc: Automatically generated from the 'compare-kernels' stage in 
      calkit.yaml. Changes made here will be overwritten.
  analyze-logs:
    cmd: calkit nb execute --environment py --no-check --to html 
      "notebooks/analyze-logs.ipynb"
    deps:
      - .calkit/notebooks/cleaned/notebooks/analyze-logs.ipynb
      - .calkit/env-locks/py
      - .calkit/scheduler/logs/amip-baseline.out
      - .calkit/scheduler/logs/amip-mod.out
    outs:
      - figures/sypd-time-series.png:
          cache: false
          persist: false
      - .calkit/notebooks/executed/notebooks/analyze-logs.ipynb:
          cache: false
      - .calkit/notebooks/html/notebooks/analyze-logs.html:
          cache: false
    desc: Automatically generated from the 'analyze-logs' stage in 
      calkit.yaml. Changes made here will be overwritten.
