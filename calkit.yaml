owner: petebachant
name: clima-gpu-profiling
title: CliMA GPU profiling
description: Profiling GPU performance for CliMA.
git_repo_url: https://github.com/petebachant/clima-gpu-profiling

environments:
  clima:
    kind: slurm
    host: clima.gps.caltech.edu
  sassy:
    kind: system
    host: sassy.caltech.edu
  py:
    path: requirements.txt
    kind: uv-venv
    prefix: .venv
    python: "3.13"

pipeline:
  stages:
    baseline-nsys:
      kind: sbatch
      environment: clima
      script_path: scripts/run-nsys.sh
      sbatch_options:
        - --gpus=1
        - --time=120
      args:
        - results/nsys/baseline
        - ClimaCoupler.jl/experiments/AMIP
        - ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      inputs:
        - scripts/run.jl
        - ClimaCoupler.jl/src
        - ClimaCoupler.jl/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
        - ClimaCoupler.jl/experiments/AMIP/Manifest-v1.11.toml
        - ClimaCoupler.jl/experiments/AMIP/code_loading.jl
        - ClimaCore.jl/ext
        - ClimaCore.jl/src
        - ClimaCore.jl/lib
      outputs:
        - results/nsys/baseline.nsys-rep
        - results/nsys/baseline.sqlite
    mod-nsys:
      kind: sbatch
      environment: clima
      script_path: scripts/run-nsys.sh
      sbatch_options:
        - --gpus=1
        - --time=120
      args:
        - results/nsys/mod
        - ClimaCoupler.jl-mod/experiments/AMIP
        - ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
      inputs:
        - scripts/run.jl
        - ClimaCoupler.jl-mod/src
        - ClimaCoupler.jl-mod/config/benchmark_configs/amip_progedmf_1m_land_he16.yml
        - ClimaCoupler.jl-mod/experiments/AMIP/Manifest-v1.11.toml
        - ClimaCoupler.jl-mod/experiments/AMIP/code_loading.jl
        - ClimaCore.jl-mod/ext
        - ClimaCore.jl-mod/src
        - ClimaCore.jl-mod/lib
        - ClimaAtmos.jl-mod/src
      outputs:
        - results/nsys/mod.nsys-rep
        - results/nsys/mod.sqlite
